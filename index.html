<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>My Line Up</title>
  <meta name="description" content="">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  
 <h1> Starting Lineup </h1>
 
  <!-- Status -->
  <p>
    <fieldset>
      <legend> Status: </legend>
      <input type="radio" id="draft" name="status" value="Draft">
      <label for="draft"> Draft </label>
      <input type="radio" id="final" name="status" value="Final" checked>
      <label for="final"> Final </label>
    </fieldset>
  </p>

  <!-- Date -->
  <p>
    <label for="gameDate"> Date: </label>
    <select id="gameDate" name="gameDate">
      <option value="March 20"> March 20 </option>
      <option value="March 24"> March 24 </option>
      <option value="April 2"> April 2 </option>
      <option value="April 6"> April 6 </option>
      <option value="April 13"> April 13 </option>
    </select>
  </p>

  <!-- Players -->
  <p>
    <fieldset>
      <legend>Players:</legend>
      <input type="checkbox" id="p1" name="player" value="Aarav Agarwal">
      <label for="p1"> Aarav Agarwal </label><br>

      <input type="checkbox" id="p2" name="player" value="Ava Johnson">
      <label for="p2"> Ava Johnson </label><br>

      <input type="checkbox" id="p3" name="player" value="Julio Ortiz">
      <label for="p3"> Julio Ortiz </label><br>

      <input type="checkbox" id="p4" name="player" value="Liam Rubio">
      <label for="p4"> Liam Rubio </label><br>

      <input type="checkbox" id="p5" name="player" value="Emma Witherspoon">
      <label for="p5"> Emma Witherspoon </label>
    </fieldset>
  </p>

  <!-- Submit -->
  <p>
    <input type="submit" id="submitBtn" value="Submit">
  </p>

  <!-- Output Display -->
  <p id="displayArea" ></p>

  <script>
    const btn = document.getElementById('submitBtn');
    const display = document.getElementById('displayArea');

    function myLineUp(event) {
      // Get values selected
      const status = document.querySelector('input[name="status"]:checked').value;
      const date = document.getElementById('gameDate').value;
      const player = document.querySelector('input[name="player"]:checked').value;
            
      // Create and display the output
      const output = "Submission Results" + "\nStatus: " + status + "\nDate: " + date + "\nPlayer: " + player;
      console.log(output);
      display.innerText = output;
    }

    // 3. Attach the listener
    btn.addEventListener('click', myLineUp);
  </script>

</body>
</html>
